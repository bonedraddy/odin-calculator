<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="calculator.js" defer></script>
    <title>Calculator</title>
  </head>
  <body>
    <header></header>
    <main>
      <div class="calculator-container" id="calculator">
        <div class="screen">
          <p class="log"></p>
          <p class="output"></p>
        </div>

        <div class="num-pad">
          <button class="digit-btn">7</button>
          <button class="digit-btn">8</button>
          <button class="digit-btn">9</button>
          <button class="operator-btn" id="divide">÷</button>
          <button class="digit-btn">4</button>
          <button class="digit-btn">5</button>
          <button class="digit-btn">6</button>
          <button class="operator-btn" id="multiply">×</button>
          <button class="digit-btn">1</button>
          <button class="digit-btn">2</button>
          <button class="digit-btn">3</button>
          <button class="operator-btn" id="subtract">-</button>
          <button class="digit-btn">0</button>
          <button class="non-digit" id="decimal">.</button>
          <button class="operator-btn" id="add">+</button>
          <button class="non-digit" id="negate">+/-</button>
        </div>
        <div class="controls">
          <button class="control-btn" id="clear">CLR</button>
          <button class="control-btn" id="equal">=</button>
        </div>
      </div>
      <div class="history-container">
        <p class="history-title">History</p>
        <span class="history"></span>
        <button class="control-btn" id="clearHistory">Clear History</button>
      </div>
    </main>
  </body>
</html>
